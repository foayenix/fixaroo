<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Artisan — Clickable Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body { width: 100vw; height: 100vh; }
  #root { width: 100%; height: 100%; }
  .proto-boot {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 18px; color: #F4EFE6;
    background: radial-gradient(120% 80% at 50% 0%, #1A1612 0%, #0A0805 70%, #000 100%);
  }
  .proto-boot .dot {
    width: 38px; height: 38px; border-radius: 10px; background: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Instrument Serif', serif; font-size: 28px; color: #C8553D;
    font-style: italic; line-height: 1;
  }
  .proto-boot .label { font-size: 11px; letter-spacing: 2px; color: rgba(244,239,230,0.5); font-weight: 700; text-transform: uppercase; }
  /* (No CSS-level scale rule — transform is set inline by the React component) */
</style>
</head>
<body>
<div id="root">
  <div class="proto-boot">
    <div class="dot">a</div>
    <div class="label">Loading Artisan</div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react" data-filename="tokens.jsx">
/* === tokens.jsx === */
// Artisan design tokens — shared across all screens.

const A = {
  // Color
  bg:        '#F4EFE6',  // app warm off-white
  surface:   '#FFFFFF',
  surfaceAlt:'#FBF8F2',
  ink:       '#1C1813',
  ink2:      '#3C342B',
  sub:       '#7A6F62',
  sub2:      '#A89E8E',
  hairline:  'rgba(28,24,19,0.08)',
  hairline2: 'rgba(28,24,19,0.14)',

  // Accents
  terracotta:'#C8553D',
  terraDark: '#A8412C',
  terraSoft: '#F4DBD0',
  terraTint: '#FBEDE6',

  sage:      '#5C7A5C',
  sageSoft:  '#E0EAE0',
  amber:     '#D9924D',

  // Type
  font:      '"Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, system-ui, sans-serif',
  serif:     '"Instrument Serif", "Times New Roman", Georgia, serif',
  mono:      '"JetBrains Mono", "SF Mono", ui-monospace, monospace',
};

// ─────────────────────────────────────────────────────────────
// Photo placeholder — warm gradient block with a tiny monospace caption.
// Used everywhere we'd otherwise need a real photo.
// ─────────────────────────────────────────────────────────────
function Photo({ tone = 'warm', label, before, height, width, radius = 16, style = {} }) {
  const tones = {
    warm:   ['#E8C9A8', '#C68B5E'],
    rust:   ['#D9A48C', '#9C5237'],
    sand:   ['#E6D5B7', '#B89A6E'],
    moss:   ['#B8C4A6', '#6F8062'],
    slate:  ['#BFC4C8', '#6E767C'],
    cream:  ['#F2E5CD', '#D3B884'],
    sky:    ['#C4D2DA', '#7A98A6'],
    plum:   ['#C7AEB0', '#8E5F66'],
    cocoa:  ['#C9B19A', '#7F5A3C'],
    sage:   ['#C2CCB4', '#7C8C6C'],
  };
  const [a, b] = tones[tone] || tones.warm;
  return (
    <div style={{
      width, height, borderRadius: radius, position: 'relative', overflow: 'hidden',
      background: `linear-gradient(135deg, ${a} 0%, ${b} 100%)`,
      flexShrink: 0, ...style,
    }}>
      {/* faint diagonal stripes for texture */}
      <div style={{
        position: 'absolute', inset: 0,
        backgroundImage: 'repeating-linear-gradient(45deg, rgba(255,255,255,0.06) 0 2px, transparent 2px 14px)',
      }} />
      {before && (
        <div style={{
          position: 'absolute', top: 8, left: 8,
          padding: '3px 7px', borderRadius: 999,
          background: 'rgba(28,24,19,0.55)', color: '#fff',
          fontSize: 9, fontWeight: 600, letterSpacing: 0.6,
          fontFamily: A.mono, textTransform: 'uppercase',
          backdropFilter: 'blur(6px)',
        }}>{before}</div>
      )}
      {label && (
        <div style={{
          position: 'absolute', bottom: 8, left: 8, right: 8,
          color: 'rgba(255,255,255,0.85)', fontFamily: A.mono,
          fontSize: 9, letterSpacing: 0.4, textTransform: 'uppercase',
          textShadow: '0 1px 3px rgba(0,0,0,0.3)',
        }}>{label}</div>
      )}
    </div>
  );
}

// Tiny inline icon set — stroke-based, 1.6px, consistent.
const Icon = {
  search:   (c='currentColor', s=18) => <svg width={s} height={s} viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="6" stroke={c} strokeWidth="1.6"/><path d="M13.5 13.5L17 17" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>,
  plus:     (c='currentColor', s=18) => <svg width={s} height={s} viewBox="0 0 20 20" fill="none"><path d="M10 4v12M4 10h12" stroke={c} strokeWidth="1.8" strokeLinecap="round"/></svg>,
  check:    (c='currentColor', s=14) => <svg width={s} height={s} viewBox="0 0 14 14" fill="none"><path d="M2 7.5l3 3 7-7" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  shield:   (c='currentColor', s=14) => <svg width={s} height={s} viewBox="0 0 14 14" fill="none"><path d="M7 1l5 2v4c0 3-2 5.5-5 6-3-.5-5-3-5-6V3l5-2z" fill={c}/><path d="M4.5 7l1.8 1.8L9.5 5.5" stroke="#fff" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  star:     (c='currentColor', s=12) => <svg width={s} height={s} viewBox="0 0 12 12" fill={c}><path d="M6 .5l1.7 3.5 3.8.5-2.8 2.7.7 3.8L6 9.2 2.6 11l.7-3.8L.5 4.5l3.8-.5L6 .5z"/></svg>,
  pin:      (c='currentColor', s=12) => <svg width={s} height={s} viewBox="0 0 12 14" fill="none"><path d="M6 .8c2.5 0 4.5 2 4.5 4.4 0 3.2-4.5 7.8-4.5 7.8S1.5 8.4 1.5 5.2C1.5 2.8 3.5.8 6 .8z" stroke={c} strokeWidth="1.4"/><circle cx="6" cy="5.2" r="1.6" fill={c}/></svg>,
  chevR:    (c='currentColor', s=12) => <svg width={s} height={s} viewBox="0 0 8 12" fill="none"><path d="M1 1l5 5-5 5" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  chevL:    (c='currentColor', s=14) => <svg width={s} height={s} viewBox="0 0 8 14" fill="none"><path d="M7 1L1 7l6 6" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  chevD:    (c='currentColor', s=10) => <svg width={s} height={s} viewBox="0 0 12 8" fill="none"><path d="M1 1l5 5 5-5" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  heart:    (c='currentColor', s=16, fill='none') => <svg width={s} height={s} viewBox="0 0 18 16" fill={fill}><path d="M9 14.5S1.5 10.5 1.5 5.5C1.5 3 3.5 1 6 1c1.5 0 2.5.8 3 1.8C9.5 1.8 10.5 1 12 1c2.5 0 4.5 2 4.5 4.5 0 5-7.5 9-7.5 9z" stroke={c} strokeWidth="1.6" strokeLinejoin="round"/></svg>,
  camera:   (c='currentColor', s=18) => <svg width={s} height={s} viewBox="0 0 20 18" fill="none"><path d="M2 5h3l1.5-2h7L15 5h3v11H2V5z" stroke={c} strokeWidth="1.5" strokeLinejoin="round"/><circle cx="10" cy="10.5" r="3.2" stroke={c} strokeWidth="1.5"/></svg>,
  msg:      (c='currentColor', s=18) => <svg width={s} height={s} viewBox="0 0 20 20" fill="none"><path d="M3 4h14v10H7l-4 3V4z" stroke={c} strokeWidth="1.6" strokeLinejoin="round"/></svg>,
  home:     (c='currentColor', s=20) => <svg width={s} height={s} viewBox="0 0 22 20" fill="none"><path d="M2 9.5L11 2l9 7.5V19h-6v-6H8v6H2V9.5z" stroke={c} strokeWidth="1.6" strokeLinejoin="round"/></svg>,
  briefcase:(c='currentColor', s=20) => <svg width={s} height={s} viewBox="0 0 22 20" fill="none"><rect x="2" y="6" width="18" height="12" rx="2" stroke={c} strokeWidth="1.6"/><path d="M8 6V4a2 2 0 012-2h2a2 2 0 012 2v2" stroke={c} strokeWidth="1.6"/></svg>,
  inbox:    (c='currentColor', s=20) => <svg width={s} height={s} viewBox="0 0 22 20" fill="none"><path d="M2 12l3-9h12l3 9v6H2v-6zM2 12h6l1 2h4l1-2h6" stroke={c} strokeWidth="1.6" strokeLinejoin="round"/></svg>,
  user:     (c='currentColor', s=20) => <svg width={s} height={s} viewBox="0 0 22 22" fill="none"><circle cx="11" cy="8" r="4" stroke={c} strokeWidth="1.6"/><path d="M3 20c0-4 4-6 8-6s8 2 8 6" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>,
  send:     (c='currentColor', s=18) => <svg width={s} height={s} viewBox="0 0 20 20" fill={c}><path d="M2 10L18 2l-4 16-4-7-8-1z"/></svg>,
  clip:     (c='currentColor', s=18) => <svg width={s} height={s} viewBox="0 0 20 20" fill="none"><path d="M14 6l-7 7a3 3 0 104 4l8-8a5 5 0 10-7-7l-8 8" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>,
  x:        (c='currentColor', s=24) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke={c} strokeWidth="2.4" strokeLinecap="round"/></svg>,
  heartBig: (c='currentColor', s=28) => <svg width={s} height={s} viewBox="0 0 28 26" fill={c}><path d="M14 24S2 16 2 9C2 5 5 2 9 2c2 0 4 1 5 3 1-2 3-3 5-3 4 0 7 3 7 7 0 7-12 15-12 15z"/></svg>,
  bolt:     (c='currentColor', s=14) => <svg width={s} height={s} viewBox="0 0 14 14" fill={c}><path d="M8 1L2 8h4l-1 5 6-7H7l1-5z"/></svg>,
  filter:   (c='currentColor', s=16) => <svg width={s} height={s} viewBox="0 0 16 16" fill="none"><path d="M2 4h12M4 8h8M6 12h4" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>,
};

// VerifiedBadge — sage check pill, signals trust without being garish.
function VerifiedBadge({ size = 16, label }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      background: A.sage, color: '#fff', borderRadius: 999,
      padding: label ? '3px 8px 3px 6px' : 0,
      width: label ? undefined : size, height: label ? undefined : size,
      justifyContent: 'center', fontSize: 11, fontWeight: 600, letterSpacing: 0.1,
    }}>
      <svg width={size === 16 ? 9 : 10} height={size === 16 ? 9 : 10} viewBox="0 0 10 10" fill="none">
        <path d="M2 5l2 2 4-4" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
      {label}
    </span>
  );
}

// Star rating row
function Stars({ rating = 5, count, size = 12, color }) {
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, color: A.ink, fontSize: 13, fontWeight: 600 }}>
      <span style={{ color: color || A.terracotta, display: 'inline-flex' }}>{Icon.star(color || A.terracotta, size)}</span>
      <span>{rating}</span>
      {count !== undefined && <span style={{ color: A.sub, fontWeight: 500 }}>({count})</span>}
    </span>
  );
}

Object.assign(window, { A, Photo, Icon, VerifiedBadge, Stars });

</script>
<script type="text/babel" data-presets="react" data-filename="screens-1.jsx">
/* === screens-1.jsx === */
// screens-1.jsx — Artisan screens 1-3: Splash, Home feed, Post a job.
// Reads from window: A, Photo, Icon, VerifiedBadge, Stars

// ─────────────────────────────────────────────────────────────
// Shared phone shell — fixed 390x844, off-white bg, status bar
// ─────────────────────────────────────────────────────────────
function Phone({ children, bg = A.bg, dark = false, statusDark = false, hideHomeIndicator = false }) {
  return (
    <div style={{
      width: 390, height: 844, position: 'relative', overflow: 'hidden',
      background: bg, fontFamily: A.font, color: A.ink,
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* status bar */}
      <div style={{
        position: 'absolute', top: 0, left: 0, right: 0, height: 54, zIndex: 50,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '18px 28px 0', pointerEvents: 'none',
      }}>
        <span style={{ fontSize: 15, fontWeight: 700, color: statusDark ? '#fff' : A.ink, letterSpacing: -0.2 }}>9:41</span>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <svg width="17" height="11" viewBox="0 0 17 11" fill={statusDark ? '#fff' : A.ink}>
            <rect x="0" y="7" width="3" height="4" rx="0.5"/>
            <rect x="4.5" y="5" width="3" height="6" rx="0.5"/>
            <rect x="9" y="2.5" width="3" height="8.5" rx="0.5"/>
            <rect x="13.5" y="0" width="3" height="11" rx="0.5"/>
          </svg>
          <svg width="15" height="11" viewBox="0 0 15 11" fill="none">
            <path d="M7.5 2.8c2 0 3.8.8 5.1 2.1l1-1A8.5 8.5 0 007.5 1.5 8.5 8.5 0 001.4 3.9l1 1c1.3-1.3 3.1-2.1 5.1-2.1z" fill={statusDark ? '#fff' : A.ink}/>
            <path d="M7.5 6c1.2 0 2.2.4 3 1.2l1-1a5.7 5.7 0 00-4-1.7 5.7 5.7 0 00-4 1.7l1 1c.8-.8 1.8-1.2 3-1.2z" fill={statusDark ? '#fff' : A.ink}/>
            <circle cx="7.5" cy="9.3" r="1.3" fill={statusDark ? '#fff' : A.ink}/>
          </svg>
          <svg width="25" height="11" viewBox="0 0 25 11" fill="none">
            <rect x="0.5" y="0.5" width="21" height="10" rx="2.5" stroke={statusDark ? '#fff' : A.ink} strokeOpacity="0.4"/>
            <rect x="2" y="2" width="18" height="7" rx="1.5" fill={statusDark ? '#fff' : A.ink}/>
            <path d="M23 3.5v4c.7-.2 1.2-.9 1.2-2s-.5-1.8-1.2-2z" fill={statusDark ? '#fff' : A.ink} fillOpacity="0.5"/>
          </svg>
        </div>
      </div>

      {children}

      {/* home indicator */}
      {!hideHomeIndicator && (
        <div style={{
          position: 'absolute', bottom: 8, left: '50%', transform: 'translateX(-50%)',
          width: 134, height: 5, borderRadius: 999, zIndex: 60,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(28,24,19,0.35)',
        }} />
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// SCREEN 1 — Splash / role select
// ─────────────────────────────────────────────────────────────
function Screen1_Splash() {
  return (
    <Phone bg={A.bg} statusDark>
      {/* Hero photo region — full-bleed top half */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 460 }}>
        <Photo tone="rust" width="100%" height={460} radius={0}
          label="HERO — tradesperson finishing kitchen island" />
        {/* vignette */}
        <div style={{
          position: 'absolute', inset: 0,
          background: 'linear-gradient(180deg, rgba(28,24,19,0.35) 0%, rgba(28,24,19,0) 30%, rgba(28,24,19,0) 60%, rgba(244,239,230,0.4) 88%, #F4EFE6 100%)',
        }} />
        {/* Brand mark in top-left */}
        <div style={{
          position: 'absolute', top: 66, left: 24,
          display: 'flex', alignItems: 'center', gap: 8,
        }}>
          <div style={{
            width: 30, height: 30, borderRadius: 8, background: '#fff',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <span style={{ fontFamily: A.serif, fontSize: 22, color: A.terracotta, fontStyle: 'italic', lineHeight: 1, marginTop: -2 }}>a</span>
          </div>
          <span style={{ color: '#fff', fontWeight: 700, fontSize: 16, letterSpacing: 0.3 }}>Artisan</span>
        </div>
      </div>

      {/* Bottom sheet */}
      <div style={{
        position: 'absolute', left: 0, right: 0, bottom: 0, height: 470,
        background: A.bg, borderRadius: '32px 32px 0 0', padding: '36px 24px 32px',
      }}>
        {/* Editorial headline */}
        <div style={{ fontFamily: A.serif, fontSize: 46, lineHeight: 1.02, color: A.ink, letterSpacing: -1.2 }}>
          Fix anything<br/>in your home.<br/>
          <span style={{ color: A.terracotta, fontStyle: 'italic' }}>In 24 hours.</span>
        </div>
        <p style={{
          fontSize: 14.5, color: A.sub, marginTop: 14, lineHeight: 1.45,
          maxWidth: 320,
        }}>
          Photo your problem. Get quotes from verified local builders. No commissions, no waiting.
        </p>

        {/* Role cards */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginTop: 26 }}>
          <button style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            background: A.ink, color: '#fff', borderRadius: 18, border: 0, padding: '16px 18px',
            fontFamily: A.font, cursor: 'pointer', textAlign: 'left',
          }}>
            <div>
              <div style={{ fontSize: 16, fontWeight: 700 }}>I'm a homeowner</div>
              <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.6)', marginTop: 2 }}>Find someone to fix things</div>
            </div>
            <div style={{ width: 36, height: 36, borderRadius: 12, background: A.terracotta, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              {Icon.chevR('#fff', 14)}
            </div>
          </button>

          <button style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            background: A.surface, color: A.ink, borderRadius: 18, border: `1px solid ${A.hairline}`, padding: '16px 18px',
            fontFamily: A.font, cursor: 'pointer', textAlign: 'left',
          }}>
            <div>
              <div style={{ fontSize: 16, fontWeight: 700 }}>I'm a contractor</div>
              <div style={{ fontSize: 12, color: A.sub, marginTop: 2 }}>Find work in your area</div>
            </div>
            <div style={{ width: 36, height: 36, borderRadius: 12, background: A.terraTint, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              {Icon.chevR(A.terracotta, 14)}
            </div>
          </button>
        </div>

        <div style={{
          textAlign: 'center', marginTop: 24,
          fontSize: 13, color: A.sub,
        }}>
          Already with us? <span style={{ color: A.terracotta, fontWeight: 700, textDecoration: 'underline', textUnderlineOffset: 3 }}>Sign in</span>
        </div>
      </div>
    </Phone>
  );
}

// ─────────────────────────────────────────────────────────────
// SCREEN 2 — Homeowner home feed
// ─────────────────────────────────────────────────────────────
function ContractorCard({ tone, before, name, trade, location, rating, reviews, price }) {
  return (
    <div style={{
      width: 248, flexShrink: 0, background: A.surface, borderRadius: 22,
      border: `1px solid ${A.hairline}`, overflow: 'hidden',
    }}>
      <div style={{ position: 'relative' }}>
        <Photo tone={tone} width={248} height={148} radius={0} before={before} />
        <div style={{
          position: 'absolute', top: 10, right: 10,
          width: 32, height: 32, borderRadius: 999, background: 'rgba(255,255,255,0.92)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          {Icon.heart(A.ink, 16)}
        </div>
      </div>
      <div style={{ padding: '12px 14px 14px' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <span style={{ fontSize: 15, fontWeight: 700, letterSpacing: -0.2 }}>{name}</span>
            <VerifiedBadge size={14} />
          </div>
          <Stars rating={rating} count={reviews} size={11} />
        </div>
        <div style={{ fontSize: 12.5, color: A.sub, marginTop: 4, display: 'flex', alignItems: 'center', gap: 4 }}>
          {trade} · {Icon.pin(A.sub2, 10)} {location}
        </div>
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginTop: 10 }}>
          <span style={{ fontSize: 13, color: A.sub }}>From</span>
          <span style={{ fontSize: 16, fontWeight: 800, color: A.ink }}>{price}<span style={{ fontSize: 12, fontWeight: 600, color: A.sub }}>/day</span></span>
        </div>
      </div>
    </div>
  );
}

function CategoryChip({ icon, label, active }) {
  return (
    <div style={{
      flexShrink: 0, padding: '9px 14px', borderRadius: 999,
      background: active ? A.ink : A.surface, color: active ? '#fff' : A.ink,
      border: active ? 'none' : `1px solid ${A.hairline}`,
      fontSize: 13, fontWeight: 600, letterSpacing: -0.1,
      display: 'flex', alignItems: 'center', gap: 6,
    }}>
      <span style={{ fontSize: 14 }}>{icon}</span> {label}
    </div>
  );
}

function TabBar({ active = 'home', contractor = false }) {
  const items = contractor
    ? [['leads','Leads',Icon.bolt],['inbox','Quotes',Icon.briefcase],['msg','Chats',Icon.msg],['user','Profile',Icon.user]]
    : [['home','Home',Icon.home],['inbox','Quotes',Icon.inbox],['msg','Chats',Icon.msg],['user','Profile',Icon.user]];
  return (
    <div style={{

// ─────────────────────────────────────────────────────────────
// Hotspot — transparent click target with reveal/flash state
// ─────────────────────────────────────────────────────────────
function Hotspot({ x, y, w, h, to, reveal, onClick }) {
  const [hover, setHover] = React.useState(false);
  const show = reveal || hover;
  return (
    <button
      onClick={(e) => { e.stopPropagation(); onClick(to); }}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      title={`→ ${to}`}
      style={{
        position: 'absolute', left: x, top: y, width: w, height: h,
        zIndex: 200, padding: 0, margin: 0, border: 0, cursor: 'pointer',
        background: show ? 'rgba(200,85,61,0.22)' : 'transparent',
        outline: show ? '1.5px solid #C8553D' : 'none',
        outlineOffset: -1,
        borderRadius: 10,
        transition: 'background .15s ease, outline-color .15s ease',
      }}
    />
  );
}

// ─────────────────────────────────────────────────────────────
// PhoneBezel — pure rounded chrome that wraps the 390x844 screen
// ─────────────────────────────────────────────────────────────
function PhoneBezel({ children }) {
  return (
    <div style={{
      width: 390, height: 844, borderRadius: 48, position: 'relative',
      background: '#F4EFE6', overflow: 'hidden',
      boxShadow: '0 32px 80px rgba(0,0,0,0.45), 0 0 0 9px #0E0B07, 0 0 0 10px rgba(255,255,255,0.06)',
    }}>{children}</div>
  );
}

// ─────────────────────────────────────────────────────────────
// ScreenMenu — index overlay (M)
// ─────────────────────────────────────────────────────────────
function ScreenMenu({ current, onPick, onClose }) {
  const groups = SCREENS.reduce((acc, s) => {
    (acc[s.group] = acc[s.group] || []).push(s);
    return acc;
  }, {});
  return (
    <div
      onClick={onClose}
      style={{
        position: 'fixed', inset: 0, zIndex: 1000,
        background: 'rgba(0,0,0,0.65)', backdropFilter: 'blur(8px)',
        WebkitBackdropFilter: 'blur(8px)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        padding: 40, fontFamily: 'Plus Jakarta Sans, system-ui, sans-serif',
      }}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          width: 'min(960px, 92vw)', maxHeight: '90vh', overflow: 'auto',
          background: '#1A1612', borderRadius: 18, padding: '28px 32px 32px',
          color: '#F4EFE6', boxShadow: '0 40px 90px rgba(0,0,0,0.6)',
          border: '1px solid rgba(255,255,255,0.08)',
        }}
      >
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 28, gap: 24 }}>
          <div>
            <div style={{ fontSize: 11, color: '#C8553D', fontWeight: 700, letterSpacing: 1.5, textTransform: 'uppercase' }}>
              Artisan · 19 screens
            </div>
            <div style={{ fontFamily: '"Instrument Serif", serif', fontSize: 32, lineHeight: 1, marginTop: 4, whiteSpace: 'nowrap' }}>
              Jump to any screen
            </div>
          </div>
          <button onClick={onClose} style={{
            background: 'transparent', border: '1px solid rgba(255,255,255,0.15)', color: '#F4EFE6',
            padding: '6px 12px', borderRadius: 8, cursor: 'pointer', fontSize: 12, fontWeight: 600,
            fontFamily: 'inherit',
          }}>Esc</button>
        </div>

        {Object.entries(groups).map(([group, items]) => (
          <div key={group} style={{ marginBottom: 22 }}>
            <div style={{
              fontSize: 10.5, color: 'rgba(244,239,230,0.5)', fontWeight: 700,
              letterSpacing: 1.5, textTransform: 'uppercase', marginBottom: 10,
            }}>{group}</div>
            <div style={{
              display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(160px, 1fr))', gap: 10,
            }}>
              {items.map((s) => {
                const active = s.id === current;
                return (
                  <button
                    key={s.id}
                    onClick={() => onPick(s.id)}
                    style={{
                      textAlign: 'left', padding: '12px 14px', borderRadius: 10, cursor: 'pointer',
                      background: active ? '#C8553D' : 'rgba(255,255,255,0.04)',
                      border: '1px solid ' + (active ? '#C8553D' : 'rgba(255,255,255,0.08)'),
                      color: active ? '#fff' : '#F4EFE6',
                      fontFamily: 'inherit', fontSize: 13, fontWeight: 600,
                      display: 'flex', flexDirection: 'column', gap: 2,
                      transition: 'background .12s, border-color .12s',
                    }}
                    onMouseEnter={(e) => { if (!active) e.currentTarget.style.background = 'rgba(255,255,255,0.08)'; }}
                    onMouseLeave={(e) => { if (!active) e.currentTarget.style.background = 'rgba(255,255,255,0.04)'; }}
                  >
                    <span style={{ fontSize: 10.5, fontWeight: 700, opacity: 0.6, letterSpacing: 0.4 }}>
                      {String(SCREEN_BY_ID[s.id].index + 1).padStart(2, '0')}
                    </span>
                    {s.label}
                  </button>
                );
              })}
            </div>
          </div>
        ))}

        <div style={{
          marginTop: 22, paddingTop: 18,
          borderTop: '1px solid rgba(255,255,255,0.08)',
          fontSize: 11.5, color: 'rgba(244,239,230,0.55)',
          display: 'flex', gap: 18, flexWrap: 'wrap',
        }}>
          <span><kbd style={kbdStyle}>H</kbd> reveal hotspots</span>
          <span><kbd style={kbdStyle}>M</kbd> menu</span>
          <span><kbd style={kbdStyle}>←</kbd>/<kbd style={kbdStyle}>→</kbd> prev / next</span>
          <span><kbd style={kbdStyle}>⌫</kbd> back</span>
        </div>
      </div>
    </div>
  );
}

const kbdStyle = {
  display: 'inline-block', padding: '1px 6px',
  background: 'rgba(255,255,255,0.08)', border: '1px solid rgba(255,255,255,0.15)',
  borderRadius: 4, fontFamily: 'JetBrains Mono, ui-monospace, monospace',
  fontSize: 10.5, color: '#F4EFE6', margin: '0 2px',
};

// ─────────────────────────────────────────────────────────────
// ProtoApp — root
// ─────────────────────────────────────────────────────────────
function ProtoApp() {
  const initial = (window.location.hash.slice(1) || 'splash');
  const [current, setCurrent] = React.useState(SCREEN_BY_ID[initial] ? initial : 'splash');
  const [reveal, setReveal] = React.useState(false);
  const [menuOpen, setMenuOpen] = React.useState(false);
  const histRef = React.useRef([current]);
  const [scale, setScale] = React.useState(1);

  const nav = React.useCallback((id) => {
    if (!SCREEN_BY_ID[id]) return;
    histRef.current.push(id);
    setCurrent(id);
    window.location.hash = id;
  }, []);

  const goBack = React.useCallback(() => {
    if (histRef.current.length > 1) {
      histRef.current.pop();
      const prev = histRef.current[histRef.current.length - 1];
      setCurrent(prev);
      window.location.hash = prev;
    }
  }, []);

  // Hashchange (browser back/forward, link sharing)
  React.useEffect(() => {
    const sync = () => {
      const h = window.location.hash.slice(1);
      if (SCREEN_BY_ID[h] && h !== current) {
        histRef.current.push(h);
        setCurrent(h);
      }
    };
    window.addEventListener('hashchange', sync);
    return () => window.removeEventListener('hashchange', sync);
  }, [current]);

  // Scale-to-fit (phone is 390x844; we letterbox into the viewport with padding)
  React.useEffect(() => {
    const calc = () => {
      const padding = 60;
      const sw = (window.innerWidth - padding * 2) / 390;
      const sh = (window.innerHeight - padding * 2) / 844;
      setScale(Math.min(1.15, Math.max(0.4, Math.min(sw, sh))));
    };
    calc();
    window.addEventListener('resize', calc);
    return () => window.removeEventListener('resize', calc);
  }, []);

  // Keyboard
  React.useEffect(() => {
    const onKey = (e) => {
      // Ignore when the menu is consuming focus from inputs etc.
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable)) return;
      const k = e.key.toLowerCase();
      if (k === 'h') {
        setReveal(true);
        clearTimeout(window.__protoFlash);
        window.__protoFlash = setTimeout(() => setReveal(false), 1600);
      } else if (k === 'm' || k === '?' || k === '/') {
        e.preventDefault();
        setMenuOpen((v) => !v);
      } else if (k === 'escape') {
        setMenuOpen(false);
      } else if (k === 'backspace') {
        e.preventDefault();
        goBack();
      } else if (k === 'arrowleft') {
        const idx = SCREEN_BY_ID[current].index;
        nav(SCREENS[(idx - 1 + SCREENS.length) % SCREENS.length].id);
      } else if (k === 'arrowright') {
        const idx = SCREEN_BY_ID[current].index;
        nav(SCREENS[(idx + 1) % SCREENS.length].id);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [current, nav, goBack]);

  // Auto-hide hint chrome after idle
  const [chromeVisible, setChromeVisible] = React.useState(true);
  React.useEffect(() => {
    let t;
    const wake = () => {
      setChromeVisible(true);
      clearTimeout(t);
      t = setTimeout(() => setChromeVisible(false), 2500);
    };
    wake();
    window.addEventListener('mousemove', wake);
    window.addEventListener('keydown', wake);
    return () => {
      window.removeEventListener('mousemove', wake);
      window.removeEventListener('keydown', wake);
      clearTimeout(t);
    };
  }, []);

  const Comp = window[SCREEN_BY_ID[current].comp];
  const spots = HOTSPOTS[current] || [];
  const meta = SCREEN_BY_ID[current];

  return (
    <div style={{
      position: 'fixed', inset: 0,
      background: 'radial-gradient(120% 80% at 50% 0%, #1A1612 0%, #0A0805 70%, #000 100%)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      overflow: 'hidden', fontFamily: '"Plus Jakarta Sans", system-ui, sans-serif',
    }}>
      <div style={{
        transform: `scale(${scale})`,
        transformOrigin: 'center center',
      }}>
        <PhoneBezel>
          {/* Screen content (no entry animation so clones for screenshots/exports render fully) */}
          <div style={{ position: 'absolute', inset: 0 }}>
            {Comp ? <Comp /> : <div style={{padding:40,color:'#900'}}>Missing component: {meta.comp}</div>}
          </div>
          {/* Hotspot overlay */}
          {spots.map((s, i) => (
            <Hotspot key={`${current}-${i}`} {...s} reveal={reveal} onClick={nav} />
          ))}
        </PhoneBezel>
      </div>

      {/* Bottom hint bar — auto-hides on idle */}
      <div style={{
        position: 'fixed', bottom: 16, left: '50%', transform: 'translateX(-50%)',
        display: 'flex', alignItems: 'center', gap: 12,
        background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.08)',
        backdropFilter: 'blur(14px)', WebkitBackdropFilter: 'blur(14px)',
        borderRadius: 999, padding: '8px 14px',
        color: 'rgba(244,239,230,0.7)', fontSize: 11, fontWeight: 600, letterSpacing: 0.3,
        opacity: chromeVisible ? 1 : 0,
        transition: 'opacity .35s ease',
        pointerEvents: chromeVisible ? 'auto' : 'none',
      }}>
        <span style={{ color: 'rgba(244,239,230,0.45)', fontWeight: 700, letterSpacing: 1 }}>
          {String(meta.index + 1).padStart(2, '0')}/{SCREENS.length}
        </span>
        <span style={{ color: '#F4EFE6' }}>{meta.label}</span>
        <span style={{ width: 1, height: 12, background: 'rgba(255,255,255,0.12)' }} />
        <button onClick={() => setMenuOpen(true)} style={hintBtn}>Menu (M)</button>
        <button onClick={() => { setReveal(true); clearTimeout(window.__protoFlash); window.__protoFlash = setTimeout(()=>setReveal(false), 1600); }} style={hintBtn}>Hotspots (H)</button>
      </div>

      {menuOpen && (
        <ScreenMenu
          current={current}
          onPick={(id) => { setMenuOpen(false); nav(id); }}
          onClose={() => setMenuOpen(false)}
        />
      )}
    </div>
  );
}

const hintBtn = {
  background: 'transparent', border: '1px solid rgba(255,255,255,0.12)',
  color: 'rgba(244,239,230,0.85)', borderRadius: 999,
  padding: '4px 10px', fontSize: 11, fontWeight: 600, cursor: 'pointer',
  fontFamily: 'inherit', letterSpacing: 0.2,
};

Object.assign(window, { ProtoApp, SCREENS, HOTSPOTS, SCREEN_BY_ID });

</script>
